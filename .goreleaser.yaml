version: 2
project_name: keepalive

before:
  hooks:
    - go mod tidy
    - go generate ./cmd/keepalive/...

builds:
  - id: keepalive
    main: ./cmd/keepalive
    binary: keepalive
    ldflags:
      - -s -w
      - -X keepalive/internal/cmd.version={{.Version}}
      - -X keepalive/internal/cmd.commit={{.ShortCommit}}
      - -X keepalive/internal/cmd.date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - package_name: keepalive
    vendor: jecortes2304
    homepage: https://github.com/jecortes2304/keepalive
    description: Keep your machine active with human-like mouse movements
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

brews:
  - name: keepalive
    repository:
      owner: jecortes2304
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/jecortes2304/keepalive
    description: Keep your machine active with human-like mouse movements
    license: MIT
    install: |
      bin.install "keepalive"
    test: |
      system "#{bin}/keepalive", "version"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: jecortes2304
    name: keepalive
